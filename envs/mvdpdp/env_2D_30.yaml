scenario: synthetic-2D
interruptable: False
use_sp: True

n_frame: 80
n_requested_frame: 60
n_node: 20
n_courier: 10
n_station: 4
n_drone: 4
min_direct_dist: 10
gen_mode: "direct"

n_init_requests: 10
n_norm_requests: 100
max_consider_requests: -1

max_capacity: 5
dist_distribution: 2D
max_dist: 10
n_node_tot: 100

dist_cost: 0.5
dist_cost_drone: 0.3
dist_cost_courier: 0.2
dist_req_profit: 1

# dist_cost: 0
# dist_cost_drone: 0
# dist_cost_courier: 0
# dist_req_profit: 1

info_batch_size: 0
debug: False

