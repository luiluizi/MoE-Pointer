scenario: synthetic-cost
interruptable: False
use_sp: True

n_frame: 58
n_requested_frame: 42
n_vehicle: 5
n_node: 20

n_init_requests: 10
n_norm_requests: 100
max_consider_requests: -1

max_capacity: 3
dist_distribution: random
max_dist: 10
dist_cost: 0.5

info_batch_size: 0
debug: False

# 环境应约满足以下等式。
# max_dist/2 * (n_init_requests + n_norm_requests) == n_vehicle * n_frame * (max_capacity / 2)
# max_value 下的reward估算：n_vehicle * n_frame * (max_capacity / 2)