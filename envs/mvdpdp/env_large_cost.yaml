scenario: synthetic-large-cost
interruptable: False
use_sp: True

n_frame: 128
n_requested_frame: 96
n_vehicle: 15
n_node: 50

n_init_requests: 50
n_norm_requests: 500
max_consider_requests: 200

max_capacity: 3
dist_distribution: random
max_dist: 30
dist_cost: 0.5

info_batch_size: 0
debug: False

# 环境应约满足以下等式。
# max_dist/2 * (n_init_requests + n_norm_requests) == n_vehicle * n_frame * (max_capacity / 2)
# max_value 下的reward估算：n_vehicle * n_frame * (max_capacity / 2)
