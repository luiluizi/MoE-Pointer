scenario: synthetic-large
interruptable: False
use_sp: True

n_frame: 120
n_requested_frame: 60
n_node: 50
n_courier: 15
n_drone: 15
n_station: 10
min_direct_dist: 10
gen_mode: "direct"

n_init_requests: 50
n_norm_requests: 500
max_consider_requests: 150

max_capacity: 3
dist_distribution: random
max_dist: 30
dist_cost: 0.0

info_batch_size: 0
debug: False

# 环境应约满足以下等式。
# max_dist/2 * (n_init_requests + n_norm_requests) == n_vehicle * n_frame * (max_capacity / 2)
# max_value 下的reward估算：n_vehicle * n_frame * (max_capacity / 2)
# python3 mat/scripts/train/train_vrp.py --n_rollout_threads=128 --mini_batch_size=128