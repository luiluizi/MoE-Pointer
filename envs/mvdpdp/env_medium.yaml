scenario: synthetic-medium
interruptable: False
use_sp: True

n_frame: 100
n_requested_frame: 60
n_node: 40
n_courier: 10
n_drone: 2
n_station: 10
min_direct_dist: 4
gen_mode: "direct"

n_init_requests: 20
n_norm_requests: 200
max_consider_requests: -1

max_capacity: 3
dist_distribution: random
max_dist: 20

dist_cost: 0.5
dist_cost_drone: 0.5
dist_cost_courier: 0.225
dist_req_profit: 1

# dist_cost: 0
# dist_cost_drone: 0
# dist_cost_courier: 0
# dist_req_profit: 1

info_batch_size: 0
debug: False

# 环境应约满足以下等式。
# max_dist/2 * (n_init_requests + n_norm_requests) == n_vehicle * n_frame * (max_capacity / 2)
# max_value 下的reward估算：n_vehicle * n_frame * (max_capacity / 2)
# python3 mat/scripts/train/train_vrp.py --n_rollout_threads=128 --mini_batch_size=128
